<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEUSKM Studios — Production Portal</title>
<style>
/* ── RESET + BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#2a2a2a;
  --gold:#c9a84c;--gold2:#e0be6a;--text:#e0e0e0;--muted:#888;--red:#e05252;
  --sidebar:220px;--header:56px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold2)}
.hidden{display:none!important}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 40% 30%,#1a140a 0%,#0a0a0a 70%);
}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:48px 40px;width:360px;text-align:center}
.login-logo{font-size:10px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:32px}
.login-box select,.login-box input{margin-bottom:14px;background:#0f0f0f;font-size:14px}
.login-box select option{background:#0f0f0f}
.btn-login{width:100%;padding:12px;background:var(--gold);color:#000;border:none;border-radius:6px;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:.2s}
.btn-login:hover{background:var(--gold2)}
.login-error{color:var(--red);font-size:12px;margin-top:10px;min-height:18px}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{
  width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;
}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{
  height:var(--header);background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;
}
#content{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR ── */
.sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-brand .studio{font-size:9px;letter-spacing:.25em;color:var(--gold);text-transform:uppercase}
.sidebar-brand .user-name{font-size:17px;font-weight:700;margin-top:8px;color:var(--text)}
.sidebar-brand .dept{font-size:11px;font-weight:600;margin-top:1px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.sidebar-brand .film{font-size:10px;color:var(--muted);margin-top:1px}
.nav-section{padding:12px 10px 4px;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.nav-item{
  display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:12px;
  color:var(--muted);cursor:pointer;border-radius:0;transition:.15s;position:relative;
  border-left:2px solid transparent;
}
.nav-item:hover{color:var(--text);background:#ffffff08}
.nav-item.active{color:var(--gold);background:#c9a84c12;border-left-color:var(--gold)}
.nav-badge{
  background:var(--red);color:#fff;font-size:9px;font-weight:700;
  min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;padding:0 4px;margin-left:auto;
}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.btn-logout{width:100%;padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;font-size:11px;letter-spacing:.05em}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* ── TOPBAR ── */
.topbar-title{font-size:14px;font-weight:600;flex:1}
.topbar-dept{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.btn-sm{padding:7px 14px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.05em;border:none;transition:.15s}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#f06262}

/* ── CARDS / SECTIONS ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:14px;font-weight:700;letter-spacing:.05em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600;letter-spacing:.05em}
.tag-green{background:#1a3a1a;color:#6fcf6f}.tag-gold{background:#2a200a;color:var(--gold)}
.tag-red{background:#2a0f0f;color:#e07070}.tag-blue{background:#0f1f2a;color:#70b0e0}
.tag-muted{background:var(--surface2);color:var(--muted)}
.casting-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:14px}
.casting-tile{background:var(--surface2);border:none;border-radius:6px;padding:10px 12px;display:flex;flex-direction:column}
.casting-tile .notes-toggle{cursor:pointer;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:8px;padding-top:6px;display:flex;justify-content:space-between;align-items:center}
.casting-tile .notes-body{display:none;margin-top:6px}
.casting-tile .notes-body.open{display:block}
.role-card{border-left:3px solid var(--gold);padding:2px 0 2px 14px;margin-bottom:18px}
.note-input,.note-edit-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;width:100%;font-size:13px;line-height:1.45;color:var(--text);resize:vertical;min-height:40px;font-family:inherit}
.note-input:focus,.note-edit-input:focus{border-color:var(--gold);outline:none}
.note-line{max-width:560px}
.note-line-text{white-space:pre-wrap}
/* ── CALLBACK RATING (star scale) ── */
.rating-stars{display:flex;gap:2px;align-items:center}
.rating-star{cursor:pointer;font-size:15px;color:var(--border);line-height:1;background:none;border:none;padding:0}
.rating-star.filled{color:var(--gold)}
.rating-star:hover{color:var(--gold2)}
.rating-label{font-size:10px;color:var(--muted);margin-left:6px}

/* ── FILE CARDS ── */
.file-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.file-icon{width:32px;height:32px;border-radius:6px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.file-meta{flex:1}
.file-name{font-size:13px;font-weight:600}
.file-sub{font-size:11px;color:var(--muted);margin-top:2px}
.file-actions{display:flex;gap:6px}

/* ── GRID LAYOUTS ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}

/* ── TIMELINE ── */
.timeline-phase{border-left:2px solid var(--border);padding:0 0 24px 20px;position:relative;margin-left:10px}
.timeline-phase:last-child{padding-bottom:0}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--border);position:absolute;left:-6px;top:4px}
.timeline-dot.active{background:var(--gold)}
.timeline-dot.done{background:#6fcf6f}
.phase-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.phase-date{font-size:13px;font-weight:700;margin-bottom:6px}
.phase-item{font-size:12px;color:var(--muted);padding:2px 0}

/* ── CREW CARDS ── */
.crew-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.crew-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.crew-info{flex:1}
.crew-name{font-size:13px;font-weight:600}
.crew-role{font-size:11px;color:var(--gold);margin-top:1px}
.crew-email{font-size:10px;color:var(--muted)}
.crew-actions{display:flex;gap:6px}

/* ── CONTRACTS HUB ── */
.contract-group{margin-bottom:20px}
.contract-group-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.contract-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px}
.contract-row-name{font-size:13px;font-weight:500}
.contract-row-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* ── LOCATION CARDS ── */
.loc-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px}
.loc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.loc-name{font-size:13px;font-weight:600}
.loc-detail{font-size:11px;color:var(--muted);margin-bottom:2px}

/* ── TAKE LOG ── */
.take-row{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:6px;display:grid;grid-template-columns:60px 60px 1fr 80px;gap:10px;align-items:center}
.take-cell{font-size:12px}
.take-label{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:#000000cc;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:100%;max-width:500px;padding:24px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.modal-row{margin-bottom:12px}
.modal-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}

/* ── PUSH SELECTOR ── */
.dept-checkboxes{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.dept-check{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.dept-check input{width:auto}

/* ── COMPACT CONTACT LIST (Availability, etc.) ── */
.contact-scroll{max-height:190px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:4px;margin-bottom:12px}
.contact-row{display:flex;align-items:center;gap:7px;padding:4px 7px;font-size:11.5px;cursor:pointer;border-radius:4px;line-height:1.3}
.contact-row:hover{background:rgba(255,255,255,0.04)}
.contact-row input{width:auto;flex:0 0 auto;margin:0}
.contact-row-name{flex:0 1 auto;max-width:42%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.contact-row-role{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:11px}
.contact-scroll-header{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:2px 7px 6px}

/* ── NOTES ── */
.note-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:8px}
.note-meta{font-size:10px;color:var(--muted);margin-bottom:6px}
.note-content{font-size:13px;line-height:1.5}
.note-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.note-square{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;justify-content:space-between;min-height:130px;aspect-ratio:1/1;overflow:hidden}
.note-square .note-content{overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical}

/* ── SCENE TABLE ── */
.scene-table{width:100%;border-collapse:collapse}
.scene-table th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border)}
.scene-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top}
.scene-table tr:last-child td{border-bottom:none}
.scene-table tr:hover td{background:#ffffff05}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--gold);background:#c9a84c08}
.upload-zone-icon{font-size:28px;margin-bottom:8px}
.upload-zone-text{font-size:13px;color:var(--muted)}
.upload-zone-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── BUDGET TABLE ── */
.budget-table{width:100%;border-collapse:collapse}
.budget-table th{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left}
.budget-table td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--border)}
.budget-table .amount{text-align:right;font-family:monospace}
.budget-total{font-weight:700;color:var(--gold)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13px;z-index:200;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px #000a;transition:.3s}
.toast.hidden{opacity:0;transform:translateY(8px)}

/* ── AVAILABILITY GRID ── */
.avail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.avail-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px}
.avail-name{font-size:12px;font-weight:600}
.avail-dates{font-size:11px;color:var(--muted);margin-top:4px}

/* ── OFFER LETTER ── */
.offer-preview{background:#0f0f0f;border:1px solid var(--border);border-radius:6px;padding:20px;font-size:12px;line-height:1.8;color:var(--text);white-space:pre-wrap;font-family:Georgia,serif}

/* tabs */
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--text)}
.tab-panel{display:none}.tab-panel.active{display:block}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">BLEUSKM Studios</div>
    <div class="login-title">Production Portal</div>
    <div class="login-sub">The Final Hand · 2026</div>
    <input type="text" id="login-user" placeholder="Username" autocomplete="username" autocapitalize="none" />
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password" />
    <button class="btn-login" onclick="doLogin()">Enter Portal</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ══ APP SHELL ══════════════════════════════════════════════════ -->
<div id="app" class="hidden">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-brand">
      <div class="studio">BLEUSKM Studios</div>
      <div class="user-name" id="sb-name"></div>
      <div class="dept" id="sb-dept">Director</div>
      <div class="film" id="sb-film">The Final Hand</div>
    </div>
    <div id="nav-items"></div>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">← Log Out</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div>
        <div class="topbar-title" id="tb-section">Dashboard</div>
        <div class="topbar-dept" id="tb-dept"></div>
      </div>
      <div id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- ══ MODAL ══════════════════════════════════════════════════════ -->
<div id="modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

function contractLink(name, email, role, type, extraValues) {
  const tpl  = CONTRACT_TEMPLATES[type] || CONTRACT_TEMPLATES['Crew Agreement'];
  const base = `https://bleuskm.com/contracts/${tpl.slug}/`;
  const params = {name, email, role, film: STATE.filmName || FILM, senddate: todayISO()};
  if (type) params.type = type;
  if (extraValues) Object.assign(params, extraValues);
  return base + '?' + new URLSearchParams(params).toString();
}

async function doLogin() {
  const username = (document.getElementById('login-user').value || '').toLowerCase().trim();
  const pass     = document.getElementById('login-pass').value;
  const err      = document.getElementById('login-err');
  err.textContent = '';
  if (!username) { err.textContent = 'Please enter your username.'; return; }
  if (!pass)     { err.textContent = 'Please enter your password.'; return; }

  try {
    const res  = await fetch(API + '?action=auth', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password: pass }),
    });
    const json = await res.json();
    if (json.ok) {
      STATE.dept     = json.department;
      STATE.realDept = json.department;
      STATE.username = username;
      STATE.name     = json.name || (LOCAL_USERS[username] && LOCAL_USERS[username].name) || '';
      sessionStorage.setItem('portal_dept', json.department);
      sessionStorage.setItem('portal_user', username);
      sessionStorage.setItem('portal_name', STATE.name);
      startApp();
    } else {
      err.textContent = 'Incorrect username or password.';
    }
  } catch(e) {
    // Fallback: local check
    const user = LOCAL_USERS[username];
    if (user && user.password === pass) {
      STATE.dept     = user.department;
      STATE.realDept = user.department;
      STATE.username = username;
      STATE.name     = user.name || '';
      sessionStorage.setItem('portal_dept', user.department);
      sessionStorage.setItem('portal_user', username);
      sessionStorage.setItem('portal_name', STATE.name);
      startApp();
    } else {
      err.textContent = 'Incorrect username or password.';
    }
  }
}

document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pass').focus(); });

function doLogout() {
  sessionStorage.removeItem('portal_dept');
  sessionStorage.removeItem('portal_user');
  sessionStorage.removeItem('portal_name');
  STATE = {dept:null, section:null, files:[], notes:[], locations:[], crew:[]};
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

// Auto-restore session
(function() {
  const savedDept = sessionStorage.getItem('portal_dept');
  const savedUser = sessionStorage.getItem('portal_user');
  const savedName = sessionStorage.getItem('portal_name');
  if (savedDept) { STATE.dept = savedDept; STATE.realDept = savedDept; STATE.username = savedUser || ''; STATE.name = savedName || ''; setTimeout(startApp, 0); }
})();

async function startApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  const label = DEPT_LABELS[STATE.dept] || STATE.dept;
  document.getElementById('sb-dept').textContent = label;
  document.getElementById('sb-name').textContent = STATE.name || '';
  document.getElementById('tb-dept').textContent = STATE.name ? `${STATE.name} · ${label}` : label;

  try {
    const res  = await fetch(`${API}?action=get-settings`);
    const data = await res.json();
    const recs = data.records || [];
    const filmSetting = recs.find(r => r.fields['Setting Name'] === 'Current Film');
    if (filmSetting) STATE.filmName = filmSetting.fields['Value'] || STATE.filmName;
  } catch(e) {}
  const filmEl = document.getElementById('sb-film');
  if (filmEl) filmEl.textContent = STATE.filmName;

  buildNav();
  await loadData();
  navigate('overview');
}

function buildNav() {
  const items = NAV[STATE.dept] || [];
  const container = document.getElementById('nav-items');
  container.innerHTML = '';
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.id = `nav-${item.id}`;
    el.onclick = () => navigate(item.id);
    el.innerHTML = `<span>${item.icon}</span><span>${item.label}</span>`;
    if (item.badge) {
      el.innerHTML += `<span class="nav-badge" id="badge-${item.id}"></span>`;
    }
    container.appendChild(el);
  });
}

async function loadData() {
  try {
    // Load files for this department
    const fr = await fetch(`${API}?action=get-files&dept=${encodeURIComponent(DEPT_LABELS[STATE.dept])}`);
    const fd = await fr.json();
    STATE.files = fd.records || [];
    updateFileBadges();
  } catch(e) { STATE.files = []; }

  try {
    const cr = await fetch(`${API}?action=get-crew`);
    const cd = await cr.json();
    STATE.crew = cd.records || [];
  } catch(e) { STATE.crew = []; }
}

function updateFileBadges() {
  const myDept = DEPT_LABELS[STATE.dept];
  const unread = STATE.files.filter(f => {
    const readBy = (f.fields['Read By'] || '');
    return !readBy.includes(myDept);
  });
  // Show badge on relevant nav items
  ['shotlist','script','references','camera','lighting','mood'].forEach(id => {
    const badge = document.getElementById(`badge-${id}`);
    if (badge) {
      const cnt = unread.filter(f => f.fields['Section'] && f.fields['Section'].toLowerCase().includes(id)).length;
      badge.textContent = cnt || '';
      badge.style.display = cnt ? '' : 'none';
    }
  });
}

function navigate(sectionId) {
  STATE.section = sectionId;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${sectionId}`);
  if (navEl) navEl.classList.add('active');

  const navItem = (NAV[STATE.dept] || []).find(n => n.id === sectionId);
  document.getElementById('tb-section').textContent = navItem ? navItem.label : sectionId;
  if (STATE.realDept && STATE.dept !== STATE.realDept) {
    showReturnBanner();
  } else {
    document.getElementById('topbar-actions').innerHTML = '';
  }

  const content = document.getElementById('content');
  content.innerHTML = '';
  const renderer = SECTIONS[STATE.dept] && SECTIONS[STATE.dept][sectionId];
  if (renderer) {
    renderer(content);
  } else {
    genericSection(sectionId, content);
  }
}

async function moveTimelinePhase(idx, direction, deptKey) {
  const phases = STATE.timelinePhases || [];
  const otherIdx = idx + direction;
  if (otherIdx < 0 || otherIdx >= phases.length) return;
  const a = phases[idx], b = phases[otherIdx];
  const aSort = a.fields['Sort Index'] ?? idx;
  const bSort = b.fields['Sort Index'] ?? otherIdx;
  try {
    await fetch(API + '?action=reorder-timeline', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ order: [{id:a.id, sortIndex:bSort}, {id:b.id, sortIndex:aSort}] }),
    });
    navigate('timeline');
  } catch(e) { toast('Failed to reorder.','❌'); }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
    reader.onerror = () => reject(new Error('Could not read file.'));
    reader.readAsDataURL(file);
  });
}

const MAX_UPLOAD_BYTES = 3.5 * 1024 * 1024; // ~3.5MB raw — stays under Vercel's request body cap once base64-encoded

async function doUpload(sectionId) {
  const name  = document.getElementById('up-name').value.trim();
  const file  = document.getElementById('up-file').files[0];
  const notes = document.getElementById('up-notes')?.value.trim() || '';
  if (!file) { toast('Please select a file.', '⚠️'); return; }
  if (file.size > MAX_UPLOAD_BYTES) {
    toast(`File too large (${(file.size/1024/1024).toFixed(1)}MB). Please keep uploads under 3.5MB.`, '⚠️');
    return;
  }

  toast('Uploading...', '⏳');
  try {
    const fileBase64 = await fileToBase64(file);

    // Determine who to push to
    const pushDepts = [];
    document.querySelectorAll('.push-check:checked').forEach(cb => pushDepts.push(cb.value));

    // Default target is whichever dashboard we're currently viewing; attribution is the real actor
    const targetDept = DEPT_LABELS[STATE.dept];
    const fromDept   = DEPT_LABELS[STATE.realDept] || targetDept;
    const targets = pushDepts.length ? pushDepts : [targetDept];

    // Upload the actual bytes once (to whichever dept is primary), then copy
    // the resulting hosted URL to any additional pushed departments.
    const [primary, ...rest] = targets;
    const res = await fetch(API + '?action=add-file', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: name || file.name,
        fileBase64,
        filename: file.name,
        fileType: file.type,
        forDept: primary,
        fromDept,
        section: sectionId,
        notes,
      }),
    });
    const data = await res.json();
    if (data.uploadError) throw new Error(data.uploadError);
    const hostedUrl = data.records && data.records[0] && data.records[0].fields && data.records[0].fields['File URL'];

    for (const forDept of rest) {
      await fetch(API + '?action=add-file', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          name: name || file.name,
          url: hostedUrl || '',
          fileType: file.type,
          forDept,
          fromDept,
          section: sectionId,
          notes,
        }),
      });
    }

    closeModal();
    toast(`"${name||file.name}" uploaded!`, '✅');
    await loadData();
    navigate(sectionId);
  } catch(e) {
    toast(e.message || 'Upload failed. Check your connection.', '❌');
  }
}

async function doPush(fileId) {
  const depts = [...document.querySelectorAll('.push-dept:checked')].map(c => c.value);
  if (!depts.length) { toast('Select at least one department.','⚠️'); return; }
  const rec = STATE.files.find(f => f.id === fileId);
  if (!rec) return;
  for (const d of depts) {
    await fetch(API + '?action=add-file', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: rec.fields['Name'],
        url: rec.fields['File URL'],
        fileType: rec.fields['File Type'],
        forDept: d,
        fromDept: DEPT_LABELS[STATE.dept],
        section: rec.fields['Section'],
        notes: rec.fields['Notes'],
      }),
    });
  }
  closeModal();
  toast(`Pushed to ${depts.join(', ')}`, '✅');
}

async function renderLocationsSection(el) {
  el.innerHTML = `
    <div class="section-header">
      <div class="section-title">📍 Location Hub</div>
      <button class="btn-sm btn-gold" onclick="showAddLocationModal()">+ Add Location</button>
    </div>
    <div id="locations-list"><p style="color:var(--muted);font-size:13px">Loading locations…</p></div>
  `;
  await loadLocations();
}

async function loadLocations() {
  const el = document.getElementById('locations-list');
  if (!el) return;
  try {
    const res = await fetch('/api/airtable-proxy?table=Portal+Locations');
    const data = await res.json();
    const recs = data.records || [];
    STATE.locations = recs;
    if (!recs.length) {
      el.innerHTML = '<p style="color:var(--muted);font-size:13px">No locations yet. Click <strong>+ Add Location</strong> to add one.</p>';
      return;
    }
    el.innerHTML = recs.map(r => {
      const f = r.fields;
      const status = f['Status'] || '';
      const statusColor = status === 'Confirmed' ? 'var(--gold)' : status === 'Rejected' ? '#e55' : 'var(--muted)';
      return `
        <div class="file-card" style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:14px;margin-bottom:4px">${esc(f['Location Name']||'Unnamed Location')}</div>
              ${f['Address'] ? `<div class="file-meta" style="margin-bottom:4px">📍 ${esc(f['Address'])}</div>` : ''}
              ${f['Contact Person'] ? `<div class="file-meta">👤 ${esc(f['Contact Person'])}${f['Phone'] ? ' · ' + esc(f['Phone']) : ''}${f['Email'] ? ' · ' + esc(f['Email']) : ''}</div>` : ''}
              ${f['Notes'] ? `<div class="file-meta" style="margin-top:6px;font-style:italic">${esc(f['Notes'])}</div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
              ${status ? `<span style="font-size:11px;font-weight:600;color:${statusColor};text-transform:uppercase;letter-spacing:.04em">${esc(status)}</span>` : ''}
              <div class="file-actions">
                <button class="btn-sm btn-outline" onclick="showEditLocationModal('${r.id}')">Edit</button>
                <button class="btn-sm btn-outline" style="color:#e55;border-color:#e55" onclick="deleteLocation('${r.id}')">Delete</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    if (el) el.innerHTML = '<p style="color:#e55;font-size:13px">Failed to load locations. Try refreshing.</p>';
  }
}

function locationFormHtml(f = {}) {
  const statuses = ['Scouting','Confirmed','On Hold','Rejected'];

      <div>

      </div>

function getLocationFormValues() {
  return {
    'Location Name': document.getElementById('loc-name')?.value.trim() || '',
    'Address':        document.getElementById('loc-address')?.value.trim() || '',
    'Contact Person': document.getElementById('loc-contact')?.value.trim() || '',
    'Phone':          document.getElementById('loc-phone')?.value.trim() || '',
    'Email':          document.getElementById('loc-email')?.value.trim() || '',
    'Status':         document.getElementById('loc-status')?.value || '',
    'Notes':          document.getElementById('loc-notes')?.value.trim() || '',

}

function showAddLocationModal() {
  showModal('Add Location', locationFormHtml(), [
    {label:'Save', cls:'btn-gold', action:'saveNewLocation()'},
    {label:'Cancel', cls:'btn-outline', action:'closeModal()'},
  ]);
}

async function saveNewLocation() {
  const fields = getLocationFormValues();
  if (!fields['Location Name']) { toast('Location name is required.','⚠️'); return; }
  Object.keys(fields).forEach(k => { if (!fields[k]) delete fields[k]; });
  try {
    const res = await fetch('/api/airtable-proxy', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({table:'Portal Locations', fields}),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    closeModal();
    toast('Location added!','📍');
    await loadLocations();
  } catch(e) { toast('Failed to save location.','⚠️'); }
}

function showEditLocationModal(recordId) {
  const r = (STATE.locations||[]).find(loc => loc.id === recordId);
  if (!r) { toast('Location not found.','⚠️'); return; }
  showModal('Edit Location', locationFormHtml(r.fields), [
    {label:'Save Changes', cls:'btn-gold', action:`saveEditLocation('${recordId}')`},
    {label:'Cancel', cls:'btn-outline', action:'closeModal()'},
  ]);
}

async function saveEditLocation(recordId) {
  const fields = getLocationFormValues();
  if (!fields['Location Name']) { toast('Location name is required.','⚠️'); return; }
  Object.keys(fields).forEach(k => { if (!fields[k]) delete fields[k]; });
  try {
    const res = await fetch('/api/airtable-proxy', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({table:'Portal Locations', id: recordId, fields}),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    closeModal();
    toast('Location updated!','✅');
    await loadLocations();
  } catch(e) { toast('Failed to update location.','⚠️'); }
}

async function deleteLocation(recordId) {
  const r = (STATE.locations||[]).find(loc => loc.id === recordId);
  const name = r ? (r.fields['Location Name']||'this location') : 'this location';
  showModal('Delete Location', `<p>Delete <strong>${esc(name)}</strong>? This cannot be undone.</p>`, [
    {label:'Delete', cls:'btn-gold', action:`confirmDeleteLocation('${recordId}')`},
    {label:'Cancel', cls:'btn-outline', action:'closeModal()'},
  ]);
}

async function confirmDeleteLocation(recordId) {
  try {
    const res = await fetch('/api/airtable-proxy', {
      method: 'DELETE',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({table:'Portal Locations', id: recordId}),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    closeModal();
    toast('Location deleted.','🗑️');
    await loadLocations();
  } catch(e) { toast('Failed to delete location.','⚠️'); }
}

function prefillContract(name, email, role, type) {
  document.getElementById('ce-name').value  = name;
  document.getElementById('ce-email').value = email;
  document.getElementById('ce-role').value  = role;
  if (type) document.getElementById('ce-type').value = type;
  renderExtraFields();
  buildContractLink();
}

function renderExtraFields() {
  const type = document.getElementById('ce-type')?.value || 'Crew Agreement';
  const tpl  = CONTRACT_TEMPLATES[type] || { extra: [] };
  const el   = document.getElementById('ce-extra-fields');
  if (!el) return;
  el.innerHTML = tpl.extra.map(f => `
    <div class="modal-row"><div class="modal-label">${esc(f.label)}</div><input id="ce-extra-${f.key}" placeholder="${esc(f.label)}"></div>
  `).join('');
}

function buildContractLink() {
  const name  = document.getElementById('ce-name').value.trim();
  const email = document.getElementById('ce-email').value.trim();
  const role  = document.getElementById('ce-role').value.trim();
  const type  = document.getElementById('ce-type')?.value || '';
  if (!name || !email) { toast('Name and email required.','⚠️'); return; }
  const tpl = CONTRACT_TEMPLATES[type] || { extra: [] };
  const extraValues = {};
  tpl.extra.forEach(f => {
    const v = document.getElementById(`ce-extra-${f.key}`)?.value.trim();
    if (v) extraValues[f.key] = v;
  });
  const link = contractLink(name, email, role, type, extraValues);
  document.getElementById('ce-link-out').innerHTML = `<a href="${link}" target="_blank">${link}</a>`;
}

function copyContractLink() {
  const out = document.getElementById('ce-link-out').textContent.trim();
  if (!out) { buildContractLink(); }
  const link = document.getElementById('ce-link-out').textContent.trim();
  if (link) { navigator.clipboard.writeText(link).then(() => toast('Link copied!','📋')); }
}

async function loadBudget() {
  try {
    const res  = await fetch(`${API}?action=get-budget`);

    STATE.budget = data.records || [];
  } catch(e) { STATE.budget = []; }

  if (!tbody) return;
  if (!STATE.budget.length) { tbody.innerHTML = '<tr><td colspan="5" style="color:var(--muted)">No budget categories yet.</td></tr>'; return; }
  tbody.innerHTML = STATE.budget.map(r => {
    const f = r.fields;
    const alloc = f['Allocated'] || 0;
    const spent = f['Spent'] || 0;
    const rem   = alloc - spent;
    return `<tr>
      <td>${esc(f['Category']||'')}</td>
      <td><input type="number" value="${alloc}" onblur="saveBudgetRow('${r.id}',this.value,null)" style="width:100px;background:transparent;border:none;color:var(--text);font-family:monospace"></td>

    </tr>`;
  }).join('');
}

async function saveBudgetRow(recordId, allocated, spent) {
  const row = STATE.budget.find(r => r.id === recordId);
  if (!row) return;
  const finalAlloc = allocated !== null ? allocated : (row.fields['Allocated']||0);
  const finalSpent = spent !== null ? spent : (row.fields['Spent']||0);
  try {
    await fetch(API + '?action=update-budget-row', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({recordId, allocated: finalAlloc, spent: finalSpent}),
    });
    toast('Budget updated','✅');
    loadBudget();
  } catch(e) { toast('Failed to update.','❌'); }

const MAIL_ALIASES = {
  studio:  { address:'studio@bleuskm.com',  label:'Studio (Zaria)', hub:'Studio' },
  crew:    { address:'crew@bleuskm.com',    label:'Crew',           hub:'Crew' },
  casting: { address:'casting@bleuskm.com', label:'Casting',        hub:'Casting' },
};

// Combined crew + (optionally) cast contact list, with Zaria/Director included
// so any department can quickly reach her. Used by Email Hub and Offer Letters.
async function getCombinedContacts(includeCast) {
  const contacts = [];
  if (STATE.realDept !== 'director') {
    contacts.push({ name:'Zaria', role:'Director', email:'studio@bleuskm.com', type:'Studio' });
  }
  (STATE.crew||[]).forEach(r => {
    const email = r.fields['Email']||'';
    if (!email) return;
    contacts.push({ name: r.fields['Name']||'', role: (r.fields['Preferred role by Director']||r.fields['Role']||'').toString(), email, type:'Crew' });
  });
  if (includeCast) {
    try {
      const res = await fetch(`${API}?action=get-casting`);
      const data = await res.json();
      (data.records||[]).forEach(r => {
        const email = r.fields['Email']||'';
        if (!email) return;
        contacts.push({ name: r.fields['Name']||'', role: r.fields['To Role']||r.fields['Role']||'', email, type:'Cast' });
      });
    } catch(e) {}
  }
  return contacts;
}

async function sendZohoMail({fromAlias, to, bcc, subject, text, attachments}) {
  const res = await fetch(MAIL_API + '?action=send', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ fromAlias, to, bcc, subject, text, attachments, sentBy: STATE.name || DEPT_LABELS[STATE.dept] || '' }),
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Send failed');
  return json;
}

function toggleContractPanel(targetId) {

function insertContractLink(targetId) {
  const type  = document.getElementById(`contract-type-${targetId}`)?.value;
  const name  = document.getElementById(`contract-name-${targetId}`)?.value.trim() || '';
  const email = document.getElementById(`contract-email-${targetId}`)?.value.trim() || '';

async function handleAttachFilePick(input, targetId) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > MAX_UPLOAD_BYTES) { toast(`File too large (${(file.size/1024/1024).toFixed(1)}MB). Keep attachments under 3.5MB.`,'⚠️'); input.value=''; return; }
  try {
    const base64 = await fileToBase64(file);
    STATE.pendingAttachment = { filename: file.name, content: base64, contentType: file.type || 'application/octet-stream' };
    const statusEl = document.getElementById(`attach-status-${targetId}`);
    if (statusEl) statusEl.innerHTML = `📎 ${esc(file.name)} attached &middot; <a href="javascript:void(0)" onclick="clearPendingAttachment('${targetId}')" style="color:var(--red)">remove</a>`;
  } catch(e) { toast('Could not read file.','❌'); }
}

function clearPendingAttachment(targetId) {
  STATE.pendingAttachment = null;
  const statusEl = document.getElementById(`attach-status-${targetId}`);
  if (statusEl) statusEl.innerHTML = '';
  const fileInput = document.getElementById(`file-${targetId}`);
  if (fileInput) fileInput.value = '';
}

function sentLogHTML(records) {
  if (!records || !records.length) return '<p style="color:var(--muted);font-size:12px;padding:6px">Nothing sent yet.</p>';
  return records.map(r => {
    const f = r.fields || {};
    const when = f['Sent At'] ? new Date(f['Sent At']).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    return `
      <div style="padding:8px 6px;border-bottom:1px solid var(--border);font-size:12px">
        <div style="display:flex;justify-content:space-between;gap:8px">
          <strong style="color:var(--text)">${esc(f['Subject']||'(no subject)')}</strong>
          <span style="color:var(--muted);white-space:nowrap">${esc(when)}</span>
        </div>
        <div style="color:var(--muted);margin-top:2px">To: ${esc((f['To']||'').toString().slice(0,140))}</div>
        <div style="color:var(--muted);margin-top:1px">From ${esc(f['From Address']||'')} &middot; sent by ${esc(f['Sent By']||'')}</div>
      </div>`;
  }).join('');
}

function inboxHTML(messages, alias) {
  if (messages === null) return '<p style="color:var(--muted);font-size:12px;padding:6px">Inbox isn\'t connected yet — sending still works.</p>';
  if (!messages.length) return '<p style="color:var(--muted);font-size:12px;padding:6px">No messages.</p>';
  STATE.readInboxUids = STATE.readInboxUids || new Set();
  return messages.map(m => {
    const when = m.date ? new Date(m.date).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    const unread = !!m.unread && !STATE.readInboxUids.has(m.uid);
    return `
      <div style="padding:8px 6px;border-bottom:1px solid var(--border);font-size:12px;cursor:pointer" onclick="openInboxMessage(${m.uid}, '${esc(alias||'studio')}')">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
          <span style="display:flex;align-items:center;gap:6px;min-width:0">
            <span style="width:7px;height:7px;border-radius:50%;flex-shrink:0;background:${unread ? 'var(--gold)' : 'transparent'}" title="${unread ? 'Unread' : ''}"></span>
            <strong style="color:var(--text);font-weight:${unread?'700':'400'}">${esc(m.subject||'(no subject)')}</strong>
          </span>
          <span style="color:var(--muted);white-space:nowrap">${esc(when)}</span>
        </div>
        <div style="color:var(--muted);margin-top:2px;margin-left:13px">From: ${esc(m.fromName ? `${m.fromName} <${m.from}>` : (m.from||''))}</div>
      </div>`;
  }).join('');
}

// Pull the bare email address out of a "Name <email>" formatted string.
function extractEmailAddress(str) {
  const match = (str||'').match(/<([^>]+)>/);
  return match ? match[1] : (str||'').trim();
}

function withSubjectPrefix(subject, prefix) {
  const s = subject || '(no subject)';
  return new RegExp('^' + prefix + '\\s*', 'i').test(s) ? s : `${prefix} ${s}`;
}

function buildQuotedReplyBody(m) {
  const when = m.date ? new Date(m.date).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}) : '';
  const quoted = (m.text||'').split('\n').map(l => '> ' + l).join('\n');
  return `\n\n\nOn ${when}, ${m.from||''} wrote:\n${quoted}`;
}

async function openInboxMessage(uid, alias) {
  showModal('Loading…', '<p style="color:var(--muted);font-size:13px">Loading message...</p>', [
    {label:'Close', cls:'btn-outline', action:'closeModal()'},
  ]);
  try {
    const res = await fetch(`${MAIL_API}?action=get-message&uid=${encodeURIComponent(uid)}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed to load message');
    const m = data.message;
    STATE.lastInboxMsg = { ...m, alias: alias || 'studio' };
    const when = m.date ? new Date(m.date).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}) : '';
    const bodyHtml = m.text
      ? `<pre style="white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.6;margin:0">${esc(m.text)}</pre>`
      : '<p style="color:var(--muted);font-size:12px">No plain-text body available for this message.</p>';
    showModal(m.subject || '(no subject)', `
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">From: ${esc(m.from||'')}</div>
      ${m.to ? `<div style="font-size:11px;color:var(--muted);margin-bottom:4px">To: ${esc(m.to)}</div>` : ''}
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">${esc(when)}</div>
      <div style="max-height:360px;overflow-y:auto;border-top:1px solid var(--border);padding-top:10px">${bodyHtml}</div>
    `, [
      {label:'Close', cls:'btn-outline', action:'closeModal()'},
      {label:'Forward', cls:'btn-outline', action:`openReplyOrForward('forward')`},
      {label:'Reply', cls:'btn-gold', action:`openReplyOrForward('reply')`},
    ]);
    // Mark read locally so the unread dot clears immediately, without needing a full reload.
    STATE.readInboxUids = STATE.readInboxUids || new Set();
    STATE.readInboxUids.add(uid);
    if (STATE.lastInboxList) {
      const inboxEl = document.getElementById('eh-inbox');
      if (inboxEl) inboxEl.innerHTML = inboxHTML(STATE.lastInboxList, alias);
    }
  } catch(e) {
    showModal('Could Not Load Email', `<p style="color:var(--red);font-size:13px">${esc(e.message||'Failed to load message.')}</p>`, [
      {label:'Close', cls:'btn-outline', action:'closeModal()'},
    ]);
  }
}

function openReplyOrForward(mode) {
  const m = STATE.lastInboxMsg;
  if (!m) { toast('Message not available.','⚠️'); return; }
  const to = mode === 'reply' ? extractEmailAddress(m.from) : '';
  const subject = withSubjectPrefix(m.subject, mode === 'reply' ? 'Re:' : 'Fwd:');
  const body = buildQuotedReplyBody(m);
  const fromAlias = m.alias || 'studio';
  showModal(`${mode === 'reply' ? 'Reply' : 'Forward'} — from ${MAIL_ALIASES[fromAlias].address}`, `
    <div class="modal-row"><div class="modal-label">To</div><input id="rf-to" value="${esc(to)}" placeholder="recipient@email.com (comma-separate for multiple)"></div>
    <div class="modal-row" style="margin-top:8px"><div class="modal-label">Subject</div><input id="rf-subject" value="${esc(subject)}"></div>
    <div class="modal-row" style="margin-top:8px"><div class="modal-label">Message</div><textarea id="rf-body" rows="10">${esc(body)}</textarea></div>
    ${attachmentControlsHTML('rf-body')}
  `, [
    {label:'Cancel', cls:'btn-outline', action:'closeModal()'},
    {label:'Send', cls:'btn-gold', action:`sendReplyForwardEmail('${fromAlias}')`},
  ]);
  STATE.pendingAttachment = null;
}

async function sendReplyForwardEmail(fromAlias) {
  const to      = document.getElementById('rf-to')?.value.trim();

  const text    = document.getElementById('rf-body')?.value.trim();
  if (!to)   { toast('Add at least one recipient.','⚠️'); return; }

      </div>

  const [messages, sent, allContacts] = await Promise.all([
    loadInboxMsgs(alias, 25),
    loadSentLog(MAIL_ALIASES[alias].hub),
    getCombinedContacts(includeCast),
  ]);
  STATE.lastInboxList = messages;
  const inboxEl = document.getElementById('eh-inbox'); if (inboxEl) inboxEl.innerHTML = inboxHTML(messages, alias);

  const contacts = filterContactsByAlias(allContacts, alias);

// Crew-only on the Crew tab, cast-only on the Casting tab, everyone on Studio.
function filterContactsByAlias(contacts, alias) {
  if (alias === 'crew') return contacts.filter(c => c.type === 'Crew');
  if (alias === 'casting') return contacts.filter(c => c.type === 'Cast');
  return contacts;
}

function copyPollLink(pollId) {
  const link = `${POLL_BASE}?id=${pollId}`;
  navigator.clipboard.writeText(link).then(() => toast('Poll link copied!','📋'));
}

async function togglePollResults(pollId) {
  const box = document.getElementById(`poll-results-${pollId}`);
  if (!box) return;
  if (!box.classList.contains('hidden')) { box.classList.add('hidden'); return; }
  box.classList.remove('hidden');
  box.innerHTML = 'Loading...';
  try {
    const res = await fetch(`${API}?action=get-poll-results&pollId=${encodeURIComponent(pollId)}`);
    const data = await res.json();
    const responses = data.records || [];
    const poll = (STATE.polls||[]).find(p => p.id === pollId);
    const options = ((poll && poll.fields['Options']) || '').split('\n').map(s=>s.trim()).filter(Boolean);
    box.innerHTML = renderPollTally(options, responses);
  } catch(e) { box.innerHTML = '<p style="color:var(--muted);font-size:12px">Failed to load results.</p>'; }
}

function renderPollTally(options, responses) {
  if (!responses.length) return '<p style="color:var(--muted);font-size:12px">No responses yet.</p>';
  const tally = {};
  options.forEach(o => tally[o] = []);
  responses.forEach(r => {
    const sel = (r.fields['Selected Options']||'').split('\n').map(s=>s.trim()).filter(Boolean);
    sel.forEach(s => { if (!tally[s]) tally[s] = []; tally[s].push(r.fields['Respondent Name']||'Someone'); });
  });
  const sorted = Object.entries(tally).sort((a,b) => b[1].length - a[1].length);
  return `
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">${responses.length} ${responses.length===1?'response':'responses'}</p>
    ${sorted.map(([opt,names]) => `
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:600"><span>${esc(opt)}</span><span style="color:var(--gold)">${names.length}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${names.length?esc(names.join(', ')):'—'}</div>
      </div>
    `).join('')}
  `;
}

function showLockFinalTime(pollId) {
  const poll = (STATE.polls||[]).find(p => p.id === pollId);
  const options = ((poll && poll.fields['Options']) || '').split('\n').map(s=>s.trim()).filter(Boolean);

      <select id="poll-announce-from">
        <option value="crew">crew@bleuskm.com</option>
        <option value="casting">casting@bleuskm.com</option>
        <option value="studio">studio@bleuskm.com</option>

    </label>

async function saveLockFinalTime(pollId) {
  const finalTime  = document.getElementById('poll-final-time').value;
  const meetLink   = document.getElementById('poll-meet-link')?.value.trim() || '';
  const fromAlias  = document.getElementById('poll-announce-from')?.value || 'crew';
  const shouldSend = document.getElementById('poll-announce-send')?.checked;
  const poll = (STATE.polls||[]).find(p => p.id === pollId);
  const title = (poll && poll.fields['Title']) || 'Meeting';
  try {
    await fetch(API + '?action=update-poll', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ recordId: pollId, status: 'Closed', finalTime }),
    });

    if (shouldSend) {
      try {
        const res = await fetch(`${API}?action=get-poll-results&pollId=${encodeURIComponent(pollId)}`);
        const data = await res.json();
        const emails = [...new Set((data.records||[]).map(r => r.fields['Respondent Email']).filter(Boolean))];
        if (emails.length) {
          const subject = `Final time locked — ${title}`;
          const bodyText = `Hi!\n\nThe final time for "${title}" is locked in:\n\n${finalTime}\n\n${meetLink ? `Join here: ${meetLink}\n\n` : ''}See you then!`;
          try {
            await sendZohoMail({ fromAlias, bcc: emails.join(','), subject, text: bodyText });
            toast(`Final time locked and announced to ${emails.length} ${emails.length===1?'person':'people'}.`,'✅');
          } catch(e) {
            toast('Locked in — Zoho send failed, opening your email client.','⚠️');
            window.location.href = `mailto:?bcc=${emails.join(',')}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
          }
        } else {
          toast('Final time locked in (no respondent emails to announce to).','✅');
        }
      } catch(e) { toast('Final time locked in (could not load responses to announce).','✅'); }
    } else {
      toast('Final time locked in','✅');
    }
    closeModal();
    navigate('polls');
  } catch(e) { toast('Failed to lock final time.','❌'); }
}

async function deletePoll(pollId) {

async function createAndSendPoll() {
  const title      = document.getElementById('poll-title').value.trim();
  const optionsRaw = document.getElementById('poll-options').value.trim();
  const fromAlias  = document.getElementById('poll-from').value;
  const checked    = [...document.querySelectorAll('.poll-recipient:checked')].map(cb => cb.value);
  if (!title)      { toast('Give the meeting a title.','⚠️'); return; }
  if (!optionsRaw) { toast('Add at least one candidate time.','⚠️'); return; }
  if (!checked.length) { toast('Select at least one recipient.','⚠️'); return; }

  try {
    const res = await fetch(API + '?action=create-poll', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title, options: optionsRaw, createdBy: STATE.name || DEPT_LABELS[STATE.dept] || '' }),
    });
    const data = await res.json();
    const pollId = data.records && data.records[0] && data.records[0].id;
    if (!pollId) throw new Error('Could not create poll.');

    const link = `${POLL_BASE}?id=${pollId}`;
    const subject = `Quick poll — ${title}`;
    const bodyText = `Hi! We're locking in a time for "${title}". Please check every time below that works for you:\n\n${link}\n\nThanks!`;
    try {
      await sendZohoMail({ fromAlias, bcc: checked.join(','), subject, text: bodyText });
      toast(`Poll created and sent to ${checked.length} ${checked.length===1?'person':'people'}.`,'✅');
    } catch(e) {
      toast('Poll created — Zoho send failed, opening your email client.','⚠️');
      window.location.href = `mailto:?bcc=${checked.join(',')}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
    }
    closeModal();
    navigate('polls');
  } catch(e) { toast('Failed to create poll.','❌'); }
}

// TASK BOARD — assign + track work across producers (and anyone else)
// ════════════════════════════════════════════════════════════════
const TASK_ASSIGNEES = ['Ceion','Carmen','Fabiola','Director (Zaria)','Unassigned'];
const TASK_STATUSES  = ['To Do','In Progress','Done'];

function currentAssigneeLabel() {
  if (STATE.name === 'Zaria') return 'Director (Zaria)';
  return STATE.name || '';
}

async function renderTaskBoard(el) {
  el.innerHTML = `
    <div class="section-header">
      <div class="section-title">Task Board</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="tb-mine-only" style="width:auto" onchange="loadTaskBoard()"> My tasks only
        </label>
        <button class="btn-sm btn-gold" onclick="showNewTaskModal()">+ New Task</button>
      </div>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px">Assign work to Ceion, Carmen, Fabiola, or yourself — grouped by person so everyone can see their own To Do, In Progress, and Done.</p>
    <div id="tb-columns">
      <p style="color:var(--muted);font-size:13px">Loading...</p>
    </div>
  `;
  await loadTaskBoard();
}

async function loadTaskBoard() {
  try {
    const res = await fetch(`${API}?action=get-tasks`);
    const data = await res.json();
    STATE.tasks = data.records || [];
  } catch(e) { STATE.tasks = []; }

  const mineOnly = document.getElementById('tb-mine-only')?.checked;
  const me = currentAssigneeLabel();
  let tasks = STATE.tasks;
  if (mineOnly && me) tasks = tasks.filter(t => t.fields['Assigned To'] === me);

  const cols = document.getElementById('tb-columns');
  if (!cols) return;

  // Group by assignee so each person's work is its own section — never mixed
  // in with everyone else's. Keep a stable, friendly order; only show
  // "Unassigned" if there's actually an unassigned task.
  const present = new Set(tasks.map(t => t.fields['Assigned To'] || 'Unassigned'));
  let order = TASK_ASSIGNEES.filter(a => a !== 'Unassigned' && (present.has(a) || !mineOnly));
  if (present.has('Unassigned')) order.push('Unassigned');
  if (mineOnly) order = order.filter(a => present.has(a));

  if (!order.length) {
    cols.innerHTML = '<p style="color:var(--muted);font-size:13px">No tasks yet.</p>';
    return;
  }

  cols.innerHTML = order.map(person => {
    const personTasks = tasks.filter(t => (t.fields['Assigned To']||'Unassigned') === person);
    return `
      <div class="card" style="margin-bottom:18px">
        <div class="card-title" style="margin-bottom:10px;display:flex;align-items:center;gap:8px">
          ${esc(person)}
          <span style="color:var(--muted);font-weight:400;font-size:12px">(${personTasks.length} ${personTasks.length===1?'task':'tasks'})</span>
        </div>
        <div class="grid3" style="align-items:start;gap:10px">
          ${TASK_STATUSES.map(status => {
            const inCol = personTasks.filter(t => (t.fields['Status']||'To Do') === status);
            return `
              <div>
                <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">${esc(status)} (${inCol.length})</div>
                ${inCol.length ? inCol.map(t => taskCardHTML(t)).join('') : '<p style="color:var(--muted);font-size:12px">Nothing here.</p>'}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function taskCardHTML(t, opts) {
  opts = opts || {};
  const manage = opts.manage !== false; // Director's board defaults to full control
  const statusFn = manage ? 'updateTaskStatus' : 'updateMyTaskStatus';
  const f = t.fields;
  const due = f['Due Date'] ? new Date(f['Due Date']+'T00:00:00') : null;
  const overdue = due && due < new Date(new Date().toDateString()) && f['Status'] !== 'Done';
  return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(f['Title']||'Untitled')}</div>
      ${f['Description'] ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">${esc(f['Description'])}</div>` : ''}
      <div style="display:flex;justify-content:flex-end;align-items:center;margin-top:8px;font-size:10px;color:var(--muted)">
        ${due ? `<span style="color:${overdue?'var(--red)':'var(--muted)'}">${overdue?'⚠ ':''}Due ${due.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>` : ''}
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <select style="font-size:10px;flex:1" onchange="${statusFn}('${t.id}',this.value)">
          ${TASK_STATUSES.map(s=>`<option ${f['Status']===s?'selected':''}>${s}</option>`).join('')}
        </select>
        ${manage ? `
          <button class="btn-sm btn-outline" style="padding:2px 8px;font-size:10px" onclick="showEditTaskModal('${t.id}')">✏️</button>
          <button class="btn-sm btn-outline" style="padding:2px 8px;font-size:10px" onclick="deleteTask('${t.id}')">🗑</button>
        ` : ''}
      </div>
    </div>
  `;
}

// PUSH TO DEPARTMENT — cross-department (and cross-person) notes
// ════════════════════════════════════════════════════════════════
const PUSH_DEPTS = [
  {key:'director',         label:'Director'},
  {key:'producer',         label:'Producer'},
  {key:'dp',               label:'DP / Camera'},
  {key:'ad',               label:'Assistant Director'},
  {key:'scriptsupervisor', label:'Script Supervisor'},
  {key:'sound',            label:'Sound'},
  {key:'all',              label:'Everyone'},
];

// Excludes yourself — pushing a note to your own name doesn't make sense,
// especially for single-person departments like Director.
function getDeptRoster(deptKey) {
  return Object.values(LOCAL_USERS).filter(u => u.department === deptKey && u.name !== STATE.name).map(u => u.name);
}

function showPushNoteModal() {
  showModal('Push a Note', `
    <div class="modal-row"><div class="modal-label">To Department</div>
      <select id="pn-dept" onchange="updatePushPersonOptions()">
        ${PUSH_DEPTS.map(d=>`<option value="${d.key}" ${d.key==='all'?'selected':''}>${esc(d.label)}</option>`).join('')}
      </select>
    </div>
    <div class="modal-row" style="margin-top:8px"><div class="modal-label">To Person</div>
      <select id="pn-person"></select>
    </div>
    <div class="modal-row" style="margin-top:8px"><div class="modal-label">Title</div><input id="pn-title" placeholder="e.g. Schedule Update"></div>
    <div class="modal-row" style="margin-top:8px"><div class="modal-label">Message</div><textarea id="pn-content" rows="4" placeholder="Write your note..."></textarea></div>
  `, [
    {label:'Cancel', cls:'btn-outline', action:'closeModal()'},
    {label:'Send', cls:'btn-gold', action:'sendPushNote()'},
  ]);
  updatePushPersonOptions();
}

function updatePushPersonOptions() {
  const deptKey = document.getElementById('pn-dept')?.value;
  const roster = deptKey === 'all' ? [] : getDeptRoster(deptKey);
  const sel = document.getElementById('pn-person');
  if (!sel) return;
  sel.innerHTML = `<option value="">Whole Department</option>` + roster.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');

async function sendPushNote() {
  const toDept   = document.getElementById('pn-dept')?.value;
  const toPerson = document.getElementById('pn-person')?.value || '';
  const title    = document.getElementById('pn-title')?.value.trim() || 'Note';
  const content  = document.getElementById('pn-content')?.value.trim();
  if (!content) { toast('Write a message first.','⚠️'); return; }
  try {
    await fetch(API + '?action=push-note', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        title, content, toDept, toPerson,
        fromDept: DEPT_LABELS[STATE.realDept] || DEPT_LABELS[STATE.dept] || '',
        fromPerson: STATE.name || '',
      }),
    });
    closeModal();
    const toLabel = (PUSH_DEPTS.find(d=>d.key===toDept)||{}).label || toDept;
    toast(`Note pushed to ${toPerson || toLabel}`,'✅');
    loadPushInbox(STATE.dept);
    loadSentNotes(STATE.dept);
  } catch(e) { toast('Failed to push note.','❌'); }
}

// Appends a compose + inbox card into whatever element is currently rendered.
async function renderPushWidget(el, deptKey) {
  el.innerHTML += `
    <div class="card" style="margin-top:16px">
      <div class="section-header" style="margin-bottom:8px">
        <div class="card-title">Push to Department</div>
        <button class="btn-sm btn-gold" onclick="showPushNoteModal()">+ Push Note</button>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Send a quick note to any department — or to a specific person once there's more than one of them.</p>
      <div id="push-inbox-${deptKey}"><p style="color:var(--muted);font-size:13px">Loading...</p></div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="section-header" style="margin-bottom:8px">
        <div class="card-title">Sent by You</div>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Notes you've pushed out — click one to edit or delete it. Edits update wherever the note was sent.</p>
      <div id="push-sent-${deptKey}"><p style="color:var(--muted);font-size:13px">Loading...</p></div>
    </div>
  `;
  await Promise.all([loadPushInbox(deptKey), loadSentNotes(deptKey)]);
}

const _pushNoteCache = {};

async function loadPushInbox(deptKey) {
  const elx = document.getElementById(`push-inbox-${deptKey}`);
  if (!elx) return;
  try {
    const res = await fetch(`${API}?action=get-pushed-notes&dept=${encodeURIComponent(deptKey)}`);
    const data = await res.json();
    const me = STATE.name || '';
    const mine = (data.records||[]).filter(r => {
      const toPerson = r.fields['To Person'] || '';
      return !toPerson || toPerson === me;
    });
    mine.forEach(r => { _pushNoteCache[r.id] = r; });
    elx.innerHTML = mine.length ? `<div class="note-grid">${mine.map(r => `
      <div class="note-square" style="cursor:pointer" onclick="openPushNote('${r.id}','${deptKey}')">
        <div>
          <div class="note-meta">${esc(r.fields['From Person']||r.fields['From Department']||'')} → ${esc(r.fields['To Person'] ? r.fields['To Person'] : 'Whole Dept')}</div>
          <div style="font-size:12px;font-weight:600;margin-bottom:4px">${esc(r.fields['Title']||'')}</div>
          <div class="note-content">${esc(r.fields['Content']||'')}</div>
        </div>
        <button class="btn-sm btn-outline" style="margin-top:8px;align-self:flex-start" onclick="event.stopPropagation();deletePushNote('${r.id}','${deptKey}')">🗑 Delete</button>
      </div>
    `).join('')}</div>` : '<p style="color:var(--muted);font-size:13px">Nothing pushed here yet.</p>';
  } catch(e) { elx.innerHTML = '<p style="color:var(--muted);font-size:13px">Could not load.</p>'; }
}

// Opens the full, untruncated note in a modal — the note-square card clamps
// content to 5 lines, so this is how the rest of a longer note gets read.
function openPushNote(recordId, deptKey) {
  const r = _pushNoteCache[recordId];
  if (!r) return;
  const meta = `${r.fields['From Person']||r.fields['From Department']||''} → ${r.fields['To Person'] ? r.fields['To Person'] : 'Whole Dept'}`;
  showModal(r.fields['Title'] || 'Note', `
    <div class="note-meta" style="margin-bottom:10px">${esc(meta)}</div>
    <div style="font-size:14px;line-height:1.6;white-space:pre-wrap">${esc(r.fields['Content']||'')}</div>
  `, [
    {label:'Close', cls:'btn-outline', action:'closeModal()'},
    {label:'🗑 Delete', cls:'btn-outline', action:`deletePushNote('${recordId}','${deptKey}');closeModal();`},
  ]);
}

// Notes the logged-in person has sent, regardless of which department or
// person they were sent to — so a pushed note also shows up on the
// sender's own dashboard, not just the recipient's.
async function loadSentNotes(deptKey) {
  const elx = document.getElementById(`push-sent-${deptKey}`);
  if (!elx) return;
  const me = STATE.name || '';
  if (!me) { elx.innerHTML = '<p style="color:var(--muted);font-size:13px">Nothing yet.</p>'; return; }
  try {
    const res = await fetch(`${API}?action=get-sent-notes&person=${encodeURIComponent(me)}`);
    const data = await res.json();
    const mine = data.records || [];
    mine.forEach(r => { _pushNoteCache[r.id] = r; });
    elx.innerHTML = mine.length ? `<div class="note-grid">${mine.map(r => {
      const toLabel = r.fields['To Person'] ? r.fields['To Person'] : (DEPT_LABELS[r.fields['To Department']] || r.fields['To Department'] || 'Everyone');
      return `
      <div class="note-square" style="cursor:pointer" onclick="openSentNote('${r.id}','${deptKey}')">
        <div>
          <div class="note-meta">To: ${esc(toLabel)}</div>
          <div style="font-size:12px;font-weight:600;margin-bottom:4px">${esc(r.fields['Title']||'')}</div>
          <div class="note-content">${esc(r.fields['Content']||'')}</div>
        </div>
        <button class="btn-sm btn-outline" style="margin-top:8px;align-self:flex-start" onclick="event.stopPropagation();deletePushNote('${r.id}','${deptKey}')">🗑 Delete</button>
      </div>
    `; }).join('')}</div>` : '<p style="color:var(--muted);font-size:13px">You haven\'t pushed any notes yet.</p>';
  } catch(e) { elx.innerHTML = '<p style="color:var(--muted);font-size:13px">Could not load.</p>'; }
}

// Opens one of YOUR sent notes in an editable modal. Saving PATCHes the
// same Airtable record the recipient reads from, so the edit shows up
// on their dashboard the next time they load their inbox.
function openSentNote(recordId, deptKey) {
  const r = _pushNoteCache[recordId];
  if (!r) return;
  const toLabel = r.fields['To Person'] ? r.fields['To Person'] : (DEPT_LABELS[r.fields['To Department']] || r.fields['To Department'] || 'Everyone');
  showModal('Edit Note', `
    <div class="modal-row"><div class="modal-label">To</div><div style="font-size:13px;color:var(--muted)">${esc(toLabel)}</div></div>
    <div class="modal-row" style="margin-top:8px"><div class="modal-label">Title</div><input id="pn-edit-title" value="${esc(r.fields['Title']||'')}"></div>
    <div class="modal-row" style="margin-top:8px"><div class="modal-label">Message</div><textarea id="pn-edit-content" rows="5">${esc(r.fields['Content']||'')}</textarea></div>
  `, [
    {label:'Cancel', cls:'btn-outline', action:'closeModal()'},
    {label:'🗑 Delete', cls:'btn-outline', action:`deletePushNote('${recordId}','${deptKey}');closeModal();`},
    {label:'Save', cls:'btn-gold', action:`saveEditedPushNote('${recordId}','${deptKey}')`},
  ]);
}

async function saveEditedPushNote(recordId, deptKey) {
  const title   = document.getElementById('pn-edit-title')?.value.trim() || 'Note';
  const content = document.getElementById('pn-edit-content')?.value.trim();
  if (!content) { toast('Write a message first.','⚠️'); return; }
  try {
    await fetch(API + '?action=update-pushed-note', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ recordId, title, content }),
    });
    closeModal();
    toast('Note updated','✅');
    loadSentNotes(deptKey);
    loadPushInbox(deptKey);
  } catch(e) { toast('Failed to update note.','❌'); }
}

async function deletePushNote(recordId, deptKey) {
  try {
    await fetch(API + '?action=delete-pushed-note', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ recordId }),
    });
    toast('Deleted','🗑');
    loadPushInbox(deptKey);
  } catch(e) { toast('Failed to delete.','❌'); }
}

async function loadCrewList() {

      const bs = typeof b.fields['Status'] === 'object' ? b.fields['Status']?.name : (b.fields['Status']||'');

        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">

            ${f['Film set role notes'] ? '<div class="file-meta" style="font-style:italic;margin-top:4px">'+esc(f['Film set role notes'])+'</div>' : ''}

}

async function renderCastingDatabase(el) {
  el.innerHTML = '<p style="color:var(--muted);font-size:13px">Loading casting submissions...</p>';
  let allRecords = [], cursor = null;
  do {
    let url = '/api/airtable-proxy?table=Casting+Submissions';
    if (cursor) url += '&offset=' + encodeURIComponent(cursor);
    const res = await fetch(url);
    const data = await res.json();
    allRecords = allRecords.concat(data.records || []);
    cursor = data.offset || null;
  } while (cursor);

  const getStatus = r => { const s = r.fields['Cast Status']; return typeof s === 'string' ? s : (s?.name || ''); };
  const confirmed = allRecords.filter(r => getStatus(r) === 'Confirmed');
  const rest = allRecords.filter(r => getStatus(r) !== 'Confirmed');

  const groups = {};
  rest.forEach(r => {
    const role = r.fields['Role'] || 'Unassigned';
    if (!groups[role]) groups[role] = [];
    groups[role].push(r);
  });

  let html = '<div class="card" style="margin-bottom:16px">';
  html += '<div class="card-title" style="display:flex;align-items:center;justify-content:space-between">';
  html += '<span>\u2705 Confirmed Cast (' + confirmed.length + ')</span>';
  html += '<button class="btn btn-sm" id="cast-send-btn">Send Contracts</button></div>';
  if (!confirmed.length) {
    html += '<p style="color:var(--muted);font-size:13px;margin:8px 0">No confirmed cast yet.</p>';
  } else {
    confirmed.forEach(r => {
      const f = r.fields;
      const name = esc(f['Name'] || f['Full Name'] || '\u2014');
      const role = esc(f['Role'] || '\u2014');
      html += '<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">';
      html += '<span style="font-weight:600">' + name + '</span>';
      html += '<span style="color:var(--muted);font-size:12px">\u2014 ' + role + '</span>';
      html += '<button class="btn btn-sm cast-uncast-btn" style="margin-left:auto;background:#c0392b" data-id="' + r.id + '">\u2717 Uncast</button></div>';
    });
  }
  html += '</div>';

  Object.keys(groups).sort().forEach(role => {
    const people = groups[role];
    const gid = 'cg_' + role.replace(/[^a-z0-9]/gi, '_');
    html += '<div class="card" style="margin-bottom:10px">';
    html += '<div class="card-title cast-group-toggle" style="cursor:pointer;user-select:none" data-gid="' + gid + '">';
    html += '\uD83C\uDFAD ' + esc(role) + ' <span style="font-size:12px;font-weight:400;color:var(--muted)">(' + people.length + ') \u25be</span></div>';
    html += '<div id="' + gid + '" style="display:none">';
    people.forEach(r => {
      const f = r.fields;
      const nm = esc(f['Name'] || f['Full Name'] || '\u2014');
      const rat = f['Rating'] || f['Star Rating'] || '';
      const tape = esc(f['Self Tape Status'] || f['Tape Status'] || '\u2014');
      const st = esc(getStatus(r) || '\u2014');
      const reel = f['Reel Link'] || f['Demo Reel'] || '';
      html += '<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      html += '<span style="font-weight:600;min-width:140px">' + nm + '</span>';
      if (rat) html += '<span style="font-size:12px">\u2b50 ' + esc(String(rat)) + '</span>';
      html += '<span style="font-size:12px;color:var(--muted)">Tape: ' + tape + '</span>';
      html += '<span style="font-size:12px;color:var(--muted)">Status: ' + st + '</span>';
      if (reel) html += '<a href="' + esc(reel) + '" target="_blank" style="font-size:12px">\uD83C\uDFAC Reel</a>';
      html += '<button class="btn btn-sm cast-confirm-btn" style="margin-left:auto;background:#1a7a4a" data-id="' + r.id + '">\u2713 Cast</button></div>';
    });
    html += '</div></div>';
  });

  el.innerHTML = html;

  el.querySelector('#cast-send-btn')?.addEventListener('click', function() {
    toast('Cast contracts \u2014 coming soon', '\uD83D\uDCCB');
  });
  el.querySelectorAll('.cast-uncast-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { updateCastStatus(this.dataset.id, null); });
  });
  el.querySelectorAll('.cast-group-toggle').forEach(function(hdr) {
    hdr.addEventListener('click', function() {
      var d = document.getElementById(this.dataset.gid);
      if (d) d.style.display = d.style.display === 'none' ? 'block' : 'none';
    });
  });
  el.querySelectorAll('.cast-confirm-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { updateCastStatus(this.dataset.id, 'Confirmed'); });
  });
}
async function updateCastStatus(recordId, status) {

    await fetch('/api/airtable-proxy', {method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    toast(status ? 'Marked as Confirmed' : 'Removed from confirmed', '🎭');
    const panel = document.getElementById('cast-tab-db');
    if (panel) renderCastingDatabase(panel);
  } catch(e) { toast('Error updating cast status','❌'); }

function castCharacter(f) {
  return (f['To Role'] || f['Role'] || '').trim() || 'Unspecified Role';
}

function slugify(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'role';
}

async function loadCastingDb() {
  try {
    const res  = await fetch(`${API}?action=get-casting`);
    const data = await res.json();
    STATE.casting = data.records || [];
  } catch(e) { STATE.casting = []; }
  try {
    const nres = await fetch(`${API}?action=get-character-notes`);
    const ndata = await nres.json();
    STATE.characterNotes = {};
    (ndata.records||[]).forEach(r => { STATE.characterNotes[r.fields['Character']] = { id: r.id, note: r.fields['Casting Notes']||'', updatedBy: r.fields['Updated By']||'' }; });
  } catch(e) { STATE.characterNotes = {}; }

  const el = document.getElementById('casting-list');
  if (!el) return;
  if (!STATE.casting.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">No callback candidates right now.</p>'; return; }

  const groups = {};
  STATE.casting.forEach(r => {
    const char = castCharacter(r.fields);
    (groups[char] = groups[char] || []).push(r);
  });
  // Show characters with casting notes set even before any callback candidates exist.
  Object.keys(STATE.characterNotes||{}).forEach(char => { groups[char] = groups[char] || []; });

  el.innerHTML = Object.keys(groups).length
    ? Object.keys(groups).sort().map(char => characterGroupHTML(char, groups[char])).join('')
    : '<p style="color:var(--muted);font-size:13px">No callback candidates right now.</p>';
}

function characterGroupHTML(character, recs) {
  const slug = slugify(character);
  const noteInfo = (STATE.characterNotes||{})[character] || { note: '' };
  const noteLines = (noteInfo.note || '').split('\n').filter(Boolean);
  const submitted = recs.filter(r => r.fields['Self Tape URL']);
  const notSubmitted = recs.filter(r => !r.fields['Self Tape URL']);
  return `
    <div class="role-card">
      <div class="card-title" style="margin-bottom:6px">🎭 ${esc(character)}</div>
      <div id="char-notes-list-${slug}">${notesListHTML(noteLines, 'character', character)}</div>
      <div style="display:flex;gap:8px;margin-top:6px;max-width:560px;align-items:flex-start">
        <textarea class="note-input" id="char-note-input-${slug}" rows="2" oninput="autoGrowNote(this)" placeholder="Add what we're looking for in this role..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addCharacterNote('${esc(character)}','char-note-input-${slug}')}"></textarea>
        <button class="btn-sm btn-outline" style="flex-shrink:0" onclick="addCharacterNote('${esc(character)}','char-note-input-${slug}')">Add</button>
      </div>
      ${recs.length ? `
        <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin:14px 0 6px">✅ Self-Tape Submitted (${submitted.length})</div>
        ${submitted.length ? `<div class="casting-grid">${submitted.map(r => castingSubmissionCardHTML(r)).join('')}</div>` : '<p style="color:var(--muted);font-size:12px;margin:0 0 10px 0">No one yet.</p>'}
        <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:10px 0 6px">⏳ Not Yet Submitted (${notSubmitted.length})</div>
        ${notSubmitted.length ? `<div class="casting-grid">${notSubmitted.map(r => castingSubmissionCardHTML(r)).join('')}</div>` : '<p style="color:var(--muted);font-size:12px;margin:0">Everyone has submitted.</p>'}
      ` : '<p style="color:var(--muted);font-size:12px;margin:14px 0 0">No callback candidates for this role yet.</p>'}
    </div>
  `;
}
