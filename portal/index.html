// ── SHARED NOTES LIST (add / delete / edit) — used by both per-role casting
// briefs and per-candidate team notes, so notes actually show up as a real
// list instead of disappearing back into the box you typed them in. ────────
function notesListHTML(lines, kind, id) {
  if (!lines.length) return '<div style="font-size:12px;color:var(--muted)">No notes yet.</div>';
  return lines.map((l, idx) => `
    <div class="note-line" id="note-line-${kind}-${slugify(id)}-${idx}" style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px">
      <div class="note-line-text" style="font-size:12px;color:var(--text);flex:1">${esc(l)}</div>
      <span style="display:flex;gap:3px;flex-shrink:0">
        <button class="btn-sm btn-outline" style="padding:0 5px;font-size:10px;line-height:1.6" onclick="startEditNoteLine('${kind}','${esc(id)}',${idx})" title="Edit this note">✎</button>
        <button class="btn-sm btn-outline" style="padding:0 5px;font-size:10px;line-height:1.6" onclick="deleteNoteLine('${kind}','${esc(id)}',${idx})" title="Delete this note">✕</button>
      </span>
    </div>
  `).join('');
}

function startEditNoteLine(kind, id, idx) {
  const lineEl = document.getElementById(`note-line-${kind}-${slugify(id)}-${idx}`);
  if (!lineEl) return;
  const textEl = lineEl.querySelector('.note-line-text');
  const current = textEl ? textEl.textContent : '';
  lineEl.style.flexDirection = 'column';
  lineEl.style.alignItems = 'stretch';
  lineEl.innerHTML = `
    <textarea class="note-edit-input" rows="2" oninput="autoGrowNote(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveEditNoteLine('${kind}','${esc(id)}',${idx})}">${esc(current)}</textarea>
    <span style="display:flex;gap:6px;margin-top:6px">
      <button class="btn-sm btn-gold" style="padding:2px 8px;font-size:11px" onclick="saveEditNoteLine('${kind}','${esc(id)}',${idx})">Save</button>
      <button class="btn-sm btn-outline" style="padding:2px 8px;font-size:11px" onclick="loadCastingDb()">Cancel</button>
    </span>
  `;
  const inp = lineEl.querySelector('textarea');
  if (inp) { inp.focus(); inp.select(); autoGrowNote(inp); }
}

// Lets note textareas grow with their content instead of staying a single
// cramped line — applied on input and right after we render one.
function autoGrowNote(el) {
  if (!el) return;
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight + 2) + 'px';
}

async function saveEditNoteLine(kind, id, idx) {
  const lineEl = document.getElementById(`note-line-${kind}-${slugify(id)}-${idx}`);
  const input = lineEl ? lineEl.querySelector('input') : null;
  const newText = input ? input.value.trim() : '';
  if (!newText) { toast("Note can't be empty.",'⚠️'); return; }
  const action = kind === 'character' ? 'edit-character-note-line' : 'edit-casting-note-line';
  const payload = kind === 'character'
    ? { character: id, lineIndex: idx, note: newText }
    : { recordId: id, lineIndex: idx, note: newText };
  try {
    const res = await fetch(`${API}?action=${action}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    const errMsg = apiErrorMessage(data, 'Save failed');
    if (errMsg) throw new Error(errMsg);
    toast('Note updated','✅');
    loadCastingDb();
  } catch(e) { toast(`Failed to update note (${e.message||'error'}).`,'❌'); }
}

function deleteNoteLine(kind, id, idx) {
  if (kind === 'character') return deleteCharacterNoteLine(id, idx);
  return deleteCastingNoteLine(id, idx);
}

// Producer callback rating scale — shown as a star's tooltip and as a label
// under the stars once a rating's been set.
const RATING_LABELS = {
  5: 'Callback Immediately — would hurt the film if we lost them.',
  4: 'Strong Callback — serious contender.',
  3: 'Maybe — good qualities but missing something.',
  2: 'Pass — doesn\'t fit the role.',
  1: 'Hard Pass — wrong energy entirely.',
};

function ratingStarsHTML(recordId, rating) {
  rating = rating || 0;
  const stars = [1,2,3,4,5].map(n => `
    <button type="button" class="rating-star ${n<=rating?'filled':''}" title="${esc(String(n))} — ${esc(RATING_LABELS[n])}" onclick="setCastingRating('${recordId}',${n===rating?0:n})">${n<=rating?'★':'☆'}</button>
  `).join('');
  return `
    <div class="rating-stars" style="margin-top:8px">
      ${stars}
      ${rating ? `<span class="rating-label">${esc(RATING_LABELS[rating].split(' — ')[0])}</span>` : '<span class="rating-label">Not rated</span>'}
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════
// MODAL + TOAST HELPERS
// ════════════════════════════════════════════════════════════════
function showModal(title, body, actions=[]) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-actions').innerHTML = actions.map(a =>
    `<button class="btn-sm ${a.cls}" onclick="${a.action}">${a.label}</button>`
  ).join('');
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

let _toastTimer;
function toast(msg, icon='ℹ️') {
  const el = document.getElementById('toast');
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  el.classList.remove('hidden');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.add('hidden'), 3000);
}

function switchTab(tabEl, panelId) {
  tabEl.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  const container = tabEl.closest('.tabs').nextElementSibling;
  let panel = container;
  // Find all tab panels as siblings
  let el = tabEl.closest('.tabs').nextElementSibling;
  while(el) { el.classList.remove('active'); el = el.nextElementSibling; }
  document.getElementById(panelId)?.classList.add('active');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function apiErrorMessage(data, fallback) {
  if (!data || !data.error) return null;
  if (typeof data.error === 'string') return data.error;
  return (data.error && data.error.message) || fallback || 'Request failed';
}

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}); } catch(e) { return d; }
}
