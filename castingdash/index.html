<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casting Portal — BLEUSKM Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="castingdash.css" />
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────────── -->
  <header class="dash-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="studio-label">BLEUSKM STUDIOS</span>
        <span class="hdivider"></span>
        <span class="page-label">CASTING PORTAL</span>
      </div>
      <div class="header-right">
        <span class="record-count" id="recordCount">— submissions</span>
        <button class="icon-btn" id="refreshBtn">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
            <path d="M12.5 7A5.5 5.5 0 1 1 7 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M7 1.5L9.5 4M7 1.5L9.5 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Refresh
        </button>
        <span class="user-chip" id="userChip"></span>
        <button class="icon-btn logout-btn" id="logoutBtn">Log out</button>
      </div>
    </div>
    <div class="header-rule"></div>
  </header>

  <!-- ── Controls ─────────────────────────────────────────────── -->
  <div class="controls-bar">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="All">All</button>
      <button class="filter-btn" data-filter="Callback">Callback</button>
      <button class="filter-btn" data-filter="Redirect">Redirect</button>
      <button class="filter-btn" data-filter="Pass">Pass</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="12" height="12" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search name, email, role, location…" />
      <button class="search-clear hidden" id="searchClear" aria-label="Clear search">✕</button>
    </div>
    <div class="batch-wrap">
      <span class="batch-count hidden" id="batchCount"></span>
      <button class="batch-btn hidden" id="batchSendBtn">Send Emails to Selected</button>
    </div>
  </div>

  <!-- ── Main ─────────────────────────────────────────────────── -->
  <main class="dash-main">

    <div class="state-panel" id="stateLoading">
      <div class="loader-ring"></div>
      <p class="state-text">Loading submissions…</p>
    </div>

    <div class="state-panel hidden" id="stateError">
      <p class="state-icon">✕</p>
      <p class="state-text" id="stateErrorMsg">Could not load data.</p>
      <button class="ghost-btn" id="retryBtn">Try again</button>
    </div>

    <div class="state-panel hidden" id="stateEmpty">
      <p class="state-text">No submissions match this filter.</p>
    </div>

    <div class="table-wrap hidden" id="tableWrap">
      <table class="casting-table">
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="selectAll" title="Select all" /></th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Film</th>
            <th>Location</th>
            <th>Media</th>
            <th>Status</th>
            <th>Email Status</th>
            <th>Notes</th>
            <th class="col-action">Action</th>
          </tr>
        </thead>
        <tbody id="castingTableBody"></tbody>
      </table>
    </div>

  </main>

  <!-- ── Redirect film modal ──────────────────────────────────── -->
  <div class="modal-overlay hidden" id="redirectModal">
    <div class="modal">
      <div class="modal-rule"></div>
      <div class="modal-body">
        <p class="modal-label">REDIRECT TO FILM</p>
        <p class="modal-name" id="modalActorName"></p>
        <div class="form-group" style="margin-top:20px;">
          <label class="field-label">Select Film</label>
          <select class="modal-select" id="filmSelect">
            <option value="">— Choose film —</option>
            <option value="Overstood">Overstood</option>
            <option value="Love Me Like This">Love Me Like This</option>
            <option value="Liminal County">Liminal County</option>
            <option value="Of Blood and Dominion">Of Blood and Dominion</option>
            <option value="As Is">As Is</option>
            <option value="The 15th Hour">The 15th Hour</option>
            <option value="__custom">Custom…</option>
          </select>
        </div>
        <div class="form-group hidden" id="customFilmGroup">
          <label class="field-label">Custom Film Name</label>
          <input type="text" class="modal-input" id="customFilmInput" placeholder="Enter film name" />
        </div>
        <div class="modal-actions">
          <button class="modal-cancel" id="modalCancel">Cancel</button>
          <button class="modal-send" id="modalSend">Send Redirect Email</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-stack" id="toastStack"></div>
  <script src="castingdash.js"></script>
</body>
</html>
