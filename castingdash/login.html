<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - BLEUSKM Studios Casting Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#080808; --surface:#0d0d0d; --border:rgba(218,175,55,.14); --borderdim:rgba(255,255,255,.05); --gold:#DAAF37; --golddim:rgba(218,175,55,.45); --text:rgba(234,223,207,.85); --muted:rgba(234,223,207,.4); --error:rgba(200,80,80,.9); --font:'League Spartan',Arial,sans-serif; }
    html, body { height: 100%; background: var(--bg); font-family: var(--font); -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .wrap { width: 100%; max-width: 420px; }
    .card { background: var(--surface); border: 1px solid var(--border); }
    .card-rule { height: 2px; background: linear-gradient(to right,var(--gold),rgba(218,175,55,.06)); }
    .card-body { padding: 48px 40px 40px; }
    .wordmark { display: block; margin-bottom: 28px; color: var(--golddim); font-size: 9px; font-weight: 700; letter-spacing: .24em; text-transform: uppercase; }
    .title { margin-bottom: 4px; color: rgba(234,223,207,.92); font-size: 24px; font-weight: 700; letter-spacing: .04em; line-height: 1.1; text-transform: uppercase; }
    .subtitle { margin-bottom: 36px; color: var(--muted); font-size: 10px; letter-spacing: .1em; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 7px; color: var(--muted); font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; }
    input { width: 100%; padding: 11px 13px; border: 1px solid var(--borderdim); background: rgba(255,255,255,.025); color: var(--text); font: 14px var(--font); outline: none; }
    input:focus { border-color: var(--golddim); }
    input::placeholder { color: rgba(234,223,207,.12); }
    .error-msg { display: none; margin-bottom: 16px; padding: 9px 13px; border: 1px solid rgba(200,80,80,.2); background: rgba(200,80,80,.05); color: var(--error); font-size: 11px; letter-spacing: .04em; }
    .error-msg.show { display: block; }
    .submit-btn { width: 100%; margin-top: 6px; padding: 14px; border: 0; background: var(--gold); color: #080808; cursor: pointer; font: 700 10px var(--font); letter-spacing: .22em; text-transform: uppercase; }
    .submit-btn:hover { opacity: .87; }
    .card-foot { padding: 14px 40px 18px; border-top: 1px solid var(--borderdim); text-align: center; }
    .card-foot p { color: rgba(234,223,207,.12); font-size: 9px; letter-spacing: .1em; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-rule"></div>
      <div class="card-body">
        <span class="wordmark">BLEUSKM Studios</span>
        <h1 class="title">Casting<br />Portal</h1>
        <p class="subtitle">Internal access only</p>
        <div class="form-group"><label for="uname">Username</label><input type="text" id="uname" autocomplete="username" placeholder="Enter username" /></div>
        <div class="form-group"><label for="pword">Password</label><input type="password" id="pword" autocomplete="current-password" placeholder="Enter password" /></div>
        <div class="error-msg" id="errMsg">Incorrect username or password.</div>
        <button class="submit-btn" id="loginBtn">Enter Portal</button>
      </div>
      <div class="card-foot"><p>BLEUSKM Studios &nbsp;-&nbsp; Internal Use Only</p></div>
    </div>
  </div>
  <script>
    const LOCKED_USERS = {
      zaria: { password: 'bleuskm2026', role: 'Admin' },
    };
    const DEFAULT_PRODUCERS = {
      ceion:   { password: 'bleuskmcrew', role: 'Producer' },
      carmen:  { password: 'bleuskmcrew', role: 'Producer' },
      ftorres: { password: 'bleuskmcrew', role: 'Producer' },
      creeves: { password: 'bleuskmcrew', role: 'Producer' },
      cscott:  { password: 'bleuskmcrew', role: 'Producer' },
    };
    function loadStoredUsers() {
      try { return JSON.parse(localStorage.getItem('bleuskm_crew') || '{}'); }
      catch { return {}; }
    }
    function getAllUsers() {
      return Object.assign({}, loadStoredUsers(), DEFAULT_PRODUCERS, LOCKED_USERS);
    }
    function seedDefaultUsers() {
      const stored = loadStoredUsers();
      let changed = false;
      Object.entries(DEFAULT_PRODUCERS).forEach(([username, data]) => {
        if (!stored[username]) { stored[username] = data; changed = true; }
      });
      if (!stored.__seeded) { stored.__seeded = true; changed = true; }
      if (changed) localStorage.setItem('bleuskm_crew', JSON.stringify(stored));
    }
    if (sessionStorage.getItem('bleuskm_auth') === 'true') window.location.replace('./index.html');
    seedDefaultUsers();
    const unameEl = document.getElementById('uname');
    const pwordEl = document.getElementById('pword');
    const errMsg = document.getElementById('errMsg');
    function attemptLogin() {
      const username = unameEl.value.trim().toLowerCase();
      const password = pwordEl.value;
      const user = getAllUsers()[username];
      if (user && user.password === password) {
        sessionStorage.setItem('bleuskm_auth', 'true');
        sessionStorage.setItem('bleuskm_user', username);
        sessionStorage.setItem('bleuskm_role', user.role || 'Producer');
        window.location.replace('./index.html');
        return;
      }
      errMsg.classList.add('show');
      pwordEl.value = '';
      pwordEl.focus();
    }
    document.getElementById('loginBtn').addEventListener('click', attemptLogin);
    [unameEl, pwordEl].forEach(input => input.addEventListener('keydown', event => {
      if (event.key === 'Enter') attemptLogin();
      errMsg.classList.remove('show');
    }));
  </script>
</body>
</html>
