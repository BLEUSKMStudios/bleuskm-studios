<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BLEUSKM OS · Vix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div id="toast" class="toast" hidden></div>

  <section id="home" class="home">
    <canvas id="orb"></canvas>
    <header class="topbar">
      <button class="brand" data-open="overview">BLEUSKM</button>
      <div class="top-actions">
        <span class="live"><i></i> VIX LIVE</span>
        <span id="clock">--:--</span>
        <button class="outline" data-open="overview">ENTER</button>
      </div>
    </header>

    <main class="vix-home">
      <p class="eyebrow">VIX</p>
      <p id="vixStatus" class="status"><span></span> READY</p>
      <button id="micBtn" class="mic" aria-label="Talk to Vix">🎤</button>
      <div id="reply" class="reply" hidden></div>
    </main>

    <nav class="quick-nav" aria-label="Quick sections">
      <button data-open="projects">PROJECTS</button>
      <button data-open="casting">CASTING</button>
      <button data-open="crew">CREW</button>
      <button data-open="clients">CLIENTS</button>
      <button data-open="content">CONTENT</button>
      <button data-open="overview">ALL</button>
    </nav>

    <form id="vixForm" class="vix-input">
      <input id="vixInput" autocomplete="off" placeholder="Ask Vix to navigate, draft, plan, review, or build..." />
      <button>SEND</button>
    </form>
  </section>

  <section id="app" class="app" hidden>
    <header class="appbar">
      <button class="brand" id="backHome">BLEUSKM</button>
      <button class="outline" id="backVix">← VIX</button>
      <h1 id="pageTitle">Overview</h1>
      <button class="ghost" id="toggleSidebar">☰</button>
    </header>

    <div class="shell">
      <aside id="sidebar" class="sidebar"></aside>
      <main id="main" class="main"></main>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
