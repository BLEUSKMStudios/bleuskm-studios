[build]
  functions = "netlify/functions"

# Fix spaces in filenames
[[redirects]]
  from = "/shop"
  to = "/bleuskm shop.html"
  status = 200

[[redirects]]
  from = "/shop.html"
  to = "/bleuskm shop.html"
  status = 200

[[redirects]]
  from = "/bleuskm-shop"
  to = "/bleuskm shop.html"
  status = 200

[[redirects]]
  from = "/as-is"
  to = "/as is.html"
  status = 200

[[redirects]]
  from = "/as-is.html"
  to = "/as is.html"
  status = 200

# Catch-all: serve .html for any path without extension
[[redirects]]
  from = "/:page"
  to = "/:page.html"
  status = 200

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://bleuskm.com"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
