[build]
  functions = "netlify/functions"

# Remove .html from URLs - redirect .html to clean URL
[[redirects]]
  from = "/:page.html"
  to = "/:page"
  status = 301
  force = true

# Serve .html files for clean URLs
[[redirects]]
  from = "/my-productions"
  to = "/my-productions.html"
  status = 200

